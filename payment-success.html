<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Success - 50 of 50</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="stylesheet" href="styles.css" />
  <script src="analytics.js"></script>
  <script src="auth.js"></script>
  <style>
    .success-shell {
      max-width: 680px;
      margin: 72px auto;
      padding: 0 20px;
    }
    .success-card {
      background: #161616;
      border: 1px solid #262626;
      border-radius: 18px;
      padding: 32px;
    }
    .success-card h1 {
      margin-top: 0;
    }
    .muted-copy {
      color: rgba(255, 255, 255, 0.74);
      line-height: 1.6;
    }
    .status {
      min-height: 24px;
      margin: 18px 0 24px;
      font-weight: 700;
    }
    .status.error {
      color: #ff7d7d;
    }
    .status.success {
      color: #76d672;
    }
    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .primary-btn,
    .ghost-btn {
      border: 0;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary-btn {
      background: #d5a43a;
      color: #111;
    }
    .ghost-btn {
      background: #2a2a2a;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="success-shell">
    <section class="success-card">
      <h1>Finalizing your challenge access</h1>
      <p class="muted-copy">
        Stripe has redirected you back. This page verifies the Checkout Session and then unlocks your one-time event challenge entry on this account.
      </p>

      <div id="status" class="status" aria-live="polite">Checking payment status...</div>

      <div class="button-row">
        <button class="primary-btn" type="button" id="challengeBtn" style="display:none;" onclick="window.location.href='challenge.html'">Start challenge</button>
        <button class="ghost-btn" type="button" onclick="window.location.href='payment.html'">Back to payment</button>
        <button class="ghost-btn" type="button" onclick="window.location.href='index.html'">Home page</button>
      </div>
    </section>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const challengeBtn = document.getElementById('challengeBtn');
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    function normalizeEmail(email) {
      return typeof email === 'string' ? email.trim().toLowerCase() : '';
    }

    function findStoredUserByEmail(email) {
      const targetEmail = normalizeEmail(email);
      if (!targetEmail || !window.authStore || typeof window.authStore.getUsers !== 'function') {
        return null;
      }

      return window.authStore.getUsers().find((user) => normalizeEmail(user.email) === targetEmail) || null;
    }

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    async function finalizeAccess() {
      let currentUser = window.authStore.getCurrentUser();

      if (!sessionId) {
        setStatus('Missing Stripe session id. Go back to the payment page and try again.', 'error');
        return;
      }

      try {
        const response = await fetch(window.authStore.apiUrl(`/api/stripe/checkout-session-status?session_id=${encodeURIComponent(sessionId)}`));
        const data = await response.json();

        if (!response.ok) {
          setStatus(data.error || 'Could not verify the Stripe payment.', 'error');
          return;
        }

        if (!data.paid) {
          setStatus('Stripe has not marked this Checkout Session as paid yet.', 'error');
          return;
        }

        const paidEmail = normalizeEmail(data.customerEmail);
        if (!currentUser || normalizeEmail(currentUser.email) !== paidEmail) {
          const matchingUser = findStoredUserByEmail(paidEmail);
          if (matchingUser) {
            window.authStore.setCurrentUser(matchingUser);
            currentUser = matchingUser;
          }
        }

        if (!currentUser) {
          setStatus('Payment was verified, but this browser session could not find the matching account. Sign in with the same email address used for payment.', 'error');
          return;
        }

        if (normalizeEmail(currentUser.email) !== paidEmail) {
          setStatus('Payment succeeded, but it belongs to a different email address than the signed-in account.', 'error');
          return;
        }

        window.authStore.grantChallengeAccess(currentUser.id, {
          source: 'stripe-checkout',
          reference: data.stripeSessionId || sessionId
        });

        challengeBtn.style.display = '';
        setStatus('Payment verified. Your one-time event challenge entry is now unlocked on this account. Choose your next step below.', 'success');
      } catch (error) {
        setStatus('Could not reach the payment server to confirm the Stripe session.', 'error');
      }
    }

    finalizeAccess();
  </script>
</body>
</html>

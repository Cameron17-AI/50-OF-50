<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movement List | 50 of 50</title>
  <link rel="stylesheet" href="movements.css" />
  <script src="analytics.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="index.html">
        <div class="brand__mark">50</div>
        <div class="brand__text">
          <div class="brand__title">50 of 50</div>
          <div class="brand__tag">Movement list</div>
        </div>
      </a>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="challenge.html">Runner</a>
        <a class="nav__active" href="movements.html">Movements</a>
        <a href="rules.html">Rules</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Movement List</h1>
      <p class="sub">
        This is the official 50 of 50 sequence. Order is locked. Each movement is 50 reps unless otherwise stated.
      </p>

      <div class="controls">
        <input id="search" type="search" placeholder="Search movements (e.g., push-up, lunge, plank)..." />
        <select id="filter">
          <option value="all">All categories</option>
          <option value="push">Push</option>
          <option value="pull">Pull</option>
          <option value="legs">Legs</option>
          <option value="glutes">Glutes</option>
          <option value="core">Core</option>
          <option value="full">Full body</option>
        </select>
      </div>

      <div class="meta">
        <span id="count">Loading…</span>
        <span class="dot">•</span>
        <span>Version 1.0</span>
      </div>
    </section>

    <section class="grid" id="grid"></section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div>50 of 50</div>
      <div class="muted">© <span id="year"></span></div>
    </div>
  </footer>

  <script src="app-config.js"></script>
  <script src="video-utils.js"></script>
  <script src="movements.js"></script>
</body>
</html>

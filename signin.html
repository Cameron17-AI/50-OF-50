<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In - 50 of 50</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="stylesheet" href="styles.css" />
  <script src="analytics.js"></script>
  <script src="auth.js"></script>
  <style>
    .auth-container {
      max-width: 400px;
      margin: 60px auto;
      background: #161616;
      border-radius: 16px;
      padding: 32px;
    }
    .auth-container h1 {
      margin: 0 0 24px 0;
      font-size: 28px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      opacity: 0.85;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0b0b0b;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #666;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .btn-signin {
      flex: 1;
      padding: 14px;
      background: #2196F3;
      color: #fff;
      border: 0;
      border-radius: 8px;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-signin:hover {
      background: #1976D2;
    }
    .btn-register {
      flex: 1;
      padding: 14px;
      background: #333;
      color: #fff;
      border: 0;
      border-radius: 8px;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-register:hover {
      background: #444;
    }
    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <h1>Sign In</h1>
    <form id="signinForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </div>

      <div id="message"></div>

      <div class="btn-group">
        <button type="submit" class="btn-signin">Sign In</button>
        <button type="button" class="btn-register" onclick="window.location.href='register.html'">Register</button>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('signinForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const users = window.authStore.getUsers();
      const user = users.find(u => u.email === email && u.password === password);
      
      if (!user) {
        document.getElementById('message').innerHTML = '<div class="error">Invalid email or password</div>';
        return;
      }
      
      window.authStore.setCurrentUser(user);
      await window.authStore.syncChallengeAccessFromServer(user);

      window.location.href = 'index.html';
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Earned - 50 of 50</title>
  <meta name="robots" content="noindex,follow" />
  <script src="analytics.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #181c24 0%, #23283a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .earned-container {
      text-align: center;
      z-index: 10;
      animation: slideInDown 0.7s cubic-bezier(.77,0,.18,1);
    }
    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-80px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .earned-text {
      font-size: 5vw;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 8px 32px #000, 0 2px 8px #1a1a2a;
      line-height: 1.15;
      animation: bounce 1.1s cubic-bezier(.77,0,.18,1) infinite;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); filter: brightness(1.1); }
      50% { transform: translateY(-32px) scale(1.09) skewX(-2deg) skewY(1deg) rotate(-1deg); filter: brightness(1.3); }
    }
    .highlight {
      color: #FFD700;
      display: inline-block;
      text-shadow: 0 2px 16px #FFD70088, 0 2px 8px #fff8;
    }
    .star {
      position: fixed;
      width: 6px;
      height: 6px;
      background: linear-gradient(135deg, #FFD700 60%, #fff 100%);
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 2.2s cubic-bezier(.77,0,.18,1) infinite;
      box-shadow: 0 0 16px #FFD70088, 0 0 8px #fff8;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="earned-container">
    <div class="earned-text">
      You have<br>
      <span class="highlight">EARNED YOUR RIGHT</span>
    </div>
  </div>

  <script>
    // Create twinkling stars
    function createStars() {
      for (let i = 0; i < 30; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        document.body.appendChild(star);
      }
    }

    createStars();

    // Redirect after 3 seconds
    setTimeout(() => {
      window.location.href = 'records.html';
    }, 3000);
  </script>
</body>
</html>

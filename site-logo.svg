<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">50 of 50 site logo</title>
  <desc id="desc">Circular 50 of 50 logo based on the homepage watermark.</desc>
  <defs>
    <radialGradient id="core" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#3b2d20" />
      <stop offset="60%" stop-color="#1e1712" />
      <stop offset="100%" stop-color="#0f0c09" />
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0c19a" />
      <stop offset="100%" stop-color="#b78d60" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="214" fill="url(#core)" />
    <circle cx="256" cy="256" r="214" fill="none" stroke="url(#ring)" stroke-width="24" />
    <circle cx="256" cy="256" r="182" fill="none" stroke="#e7d5bb" stroke-opacity="0.22" stroke-width="8" />
  </g>
  <text x="256" y="316" text-anchor="middle" font-size="236" font-weight="900" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', Arial, sans-serif" letter-spacing="-10" fill="#d9b48f">50</text>
</svg>
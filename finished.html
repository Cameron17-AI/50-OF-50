<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finished - 50 of 50</title>
  <meta name="robots" content="noindex,follow" />
  <script src="analytics.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #181c24 0%, #23283a 100%);
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .finished-container {
      text-align: center;
      z-index: 10;
      animation: slideInUp 0.6s cubic-bezier(.77,0,.18,1);
    }
    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(80px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .finished-text {
      font-size: 8vw;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 8px 32px #000, 0 2px 8px #1a1a2a;
      letter-spacing: -2px;
      animation: pulse 1.1s cubic-bezier(.77,0,.18,1) infinite;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: brightness(1.1); }
      50% { transform: scale(1.13) skewX(-2deg) skewY(1deg) rotate(-1deg); filter: brightness(1.3); }
    }
    .confetti {
      position: fixed;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFD700 40%, #6A4C93 100%);
      box-shadow: 0 2px 12px #0008;
      pointer-events: none;
      opacity: 0.85;
      animation: confettiFall 2.5s cubic-bezier(.77,0,.18,1) forwards;
    }
    @keyframes confettiFall {
      to {
        transform: translateY(110vh) rotate(540deg) scale(0.7);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="finished-container">
    <div class="finished-text">Finished</div>
  </div>

  <script>
    // Create confetti effect
    function createConfetti() {
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.delay = Math.random() * 0.5 + 's';
        confetti.style.backgroundColor = ['#FFD700', '#FF6B6B', '#38ADA9', '#6A4C93', '#FFE66D'][Math.floor(Math.random() * 5)];
        document.body.appendChild(confetti);
      }
    }

    createConfetti();

    // Redirect after 3 seconds
    setTimeout(() => {
      window.location.href = 'earned.html';
    }, 3000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Don't Quit!</title>
  <meta name="robots" content="noindex,follow" />
  <script src="analytics.js"></script>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; }
    body { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #dontquit-video {
      width: 90vw; max-width: 600px; border-radius: 16px; box-shadow: 0 4px 32px #000a; margin-bottom: 32px;
    }
    .quit-btn, .back-btn {
      font-size: 1.3em; padding: 16px 32px; border: none; border-radius: 8px; margin: 12px; font-weight: bold; cursor: pointer; }
    .quit-btn { background: #c00; color: #fff; }
    .back-btn { background: #0c0; color: #fff; }
    .msg { font-size: 2em; font-weight: bold; margin-bottom: 24px; text-align: center; }
    .submsg {
      margin: -4px 0 30px;
      padding: 14px 24px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffd54a;
      font-size: 1.65em;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: center;
      box-shadow: 0 0 28px rgba(255, 213, 74, 0.22);
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="msg">DON'T QUIT<br>KEEP GOING</div>
    <div class="submsg">EARN YOUR RIGHT</div>
    <video id="dontquit-video" src="assets/videos/dontquit.mp4" autoplay loop muted playsinline></video>
    <div>
      <button class="back-btn" id="backToChallenge">Back to Challenge</button>
      <button class="quit-btn" id="quitForReal">Quit for Real</button>
    </div>
  </div>
  <script>
    const QUIT_STATE_KEY = '50of50_quit_state';
    const QUIT_IDX_KEY = '50of50_quit_idx';
    const RESUME_REQUESTED_KEY = '50of50_resume_requested';

    function getQuitElapsedTime() {
      try {
        const rawState = sessionStorage.getItem(QUIT_STATE_KEY);
        if (!rawState) return 0;

        const parsedState = JSON.parse(rawState);
        const storedStartTime = Number(parsedState?.startTime);
        if (!Number.isFinite(storedStartTime) || storedStartTime <= 0) {
          return 0;
        }

        return Math.max(0, Date.now() - storedStartTime);
      } catch (error) {
        return 0;
      }
    }

    function clearQuitProgress() {
      sessionStorage.removeItem(QUIT_STATE_KEY);
      sessionStorage.removeItem(QUIT_IDX_KEY);
      sessionStorage.removeItem(RESUME_REQUESTED_KEY);
    }

    document.getElementById('backToChallenge').onclick = function() {
      sessionStorage.setItem(RESUME_REQUESTED_KEY, '1');
      window.location.href = 'challenge.html';
    };
    document.getElementById('quitForReal').onclick = function() {
      // Save quit progress to results and clear resumable state
      try {
        const idx = Number(sessionStorage.getItem(QUIT_IDX_KEY));
        const currentUser = JSON.parse(localStorage.getItem('50of50_currentUser'));
        let results = JSON.parse(localStorage.getItem('50of50_results')) || [];
        if (currentUser && !isNaN(idx)) {
          results.push({
            userId: currentUser.id,
            name: currentUser.name,
            sex: currentUser.sex,
            age: currentUser.age,
            city: currentUser.city,
            finishTime: getQuitElapsedTime(),
            completedAt: new Date().toISOString(),
            lastIdx: idx
          });
          localStorage.setItem('50of50_results', JSON.stringify(results));
        }
      } catch (e) {}
      clearQuitProgress();
      window.location.href = 'records.html?quit=1';
    };
  </script>
</body>
</html>
